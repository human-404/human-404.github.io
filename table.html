    <div class="container-fluid">
        <main class="row">
            <div class="col">
                <div id="table-container"></div>
            </div>
        </main>
    </div>
    <style>
        label, th, tr, ul, div, a, input {
            font-family: 'LMRoman10', sans-serif;
            font-style: normal;
        }
        .chip {
            display: inline-block;
            padding: 0 10px;
            border-radius: 25px;

            margin: 1px;
        }
        .editable {
            text-align: left;
        }

    <script src="https://code.jquery.com/jquery-3.3.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.2.1/js/bootstrap.bundle.min.js"></script>
    <script src="js/jquery.csv.min.js"></script>
    <script src="https://cdn.datatables.net/1.10.19/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.10.19/js/dataTables.bootstrap4.min.js"></script>
    <script src="js/csv_to_html_table.js"></script>

    <script>
        window.addEventListener("load", initPage, true); function initPage() {
            update_math();
        }

        function pastePlainText(e) {
            e.stopPropagation();
            e.preventDefault();
        
            // paste data via clipboard API
            var text = e.clipboardData.getData("text/plain");
            document.execCommand("insertHTML", false, text);
        }

        function updatePlainText() {
            var allTeX = document.getElementsByClassName("plainText");
            for (var TeX of allTeX) {
                TeX.addEventListener("paste", pastePlainText);
            }
        }

        function update_math() {
            MathJax.Hub.Queue(["Typeset", MathJax.Hub]);
            setTimeout(update_math, 1000);
        }

        CsvToHtmlTable.init({
            csv_path: "data.csv",
            element: "table-container",
            allow_download: true,
            csv_options: {
                separator: ",",
                delimiter: '"'
            },
            datatables_options: {
                paging: true
            }
        });
    </script>

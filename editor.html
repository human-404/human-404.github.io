    <script>
        function pastePlainText(e) {
            e.stopPropagation();
            e.preventDefault();
        
            // paste data via clipboard API
            var text = e.clipboardData.getData("text/plain");
            document.execCommand("insertHTML", false, text);
        }

        function updatePlainText() {
            var allTeX = document.getElementsByClassName("plainText");
            for (var TeX of allTeX) {
                TeX.addEventListener("paste", pastePlainText);
            }
        }

        function empty() {
            if (document.getElementsByClassName("form-control form-control-sm")[0].value) {
                alert("disabled");
                return false;
            }
            var x;
            x = document.getElementById("formInput").value;
            if (x == "") {
                updateTable(false);
                return true;
            };
        }

        function empty_backup() {
            if (document.getElementsByClassName("form-control form-control-sm")[0].value) {
                alert("disabled");
                return false;
            }
            var x;
            x = document.getElementById("formInput_backup").value;
            if (x == "") {
                updateTable(false);
                return true;
            };
        }

        function updateTable(bool) {
            if (bool) {
                alert("complete");
            }
            var idTable = document.getElementById("table-container-table");

            var table = [];
            var header = ["LaTeX", "Description"];
            table.push(header);

            for (var i = 1; i < idTable.rows.length; i ++) {
                var innerList = [];
                var rowTeX = idTable.rows[i].cells[1].children[0];
                var rowTAG = idTable.rows[i].cells[2];

                if (rowTeX.className == "isRendered") {
                    var textLaTeX = rowTeX.children[2];
                    var textLaTeXFormat = "$$" + textLaTeX.innerHTML + "$$";
                    innerList.push(textLaTeXFormat); // push TeX

                    // chip children
                    var list = [];
                    list.push((rowTAG.children[0]).innerHTML); // push first child

                    for (var j = 1; j < (rowTAG.children).length; j ++) {
                        var chipText = " " + rowTAG.children[j].innerHTML;
                        list.push(chipText);
                    }
                    innerList.push(list.toString());

                } else {
                    var textLaTeX = rowTeX;
                    innerList.push(textLaTeX.innerHTML); // push TeX
                    innerList.push(rowTAG.innerHTML); // push text
                }

                table.push(innerList);
            }
            document.getElementById("formInput").value = JSON.stringify(table); // pass Javascript array to php
            document.getElementById("formInput_backup").value = JSON.stringify(table); // pass Javascript array to php
        }

        CsvToHtmlTable.init({
            csv_path: "data.csv",
            element: "table-container",
            allow_download: true,
            csv_options: {
                separator: ",",
                delimiter: '"'
            },
            datatables_options: {
                paging: false
            },
            write: true
        });
    </script>
